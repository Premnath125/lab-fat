apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-static-app           # CHANGE THIS to your app name
  labels:
    app: my-static-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-static-app
  template:
    metadata:
      labels:
        app: my-static-app
    spec:
      containers:
      - name: web-container
        image: premnath0210/my-static-image:latest   # CHANGE THIS
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-static-service
spec:
  type: NodePort
  selector:
    app: my-static-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30008         # Access via <NodeIP>:30007
